name: Build Windows exe

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Publish a release with this tag (e.g. v0.2.0). Leave empty to just build.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows executable
        run: npm run build:win

      - name: Bundle ffmpeg (checksum-verified)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          # Pin a specific BtbN release for reproducible builds by setting the
          # repo variable FFMPEG_TAG to a dated tag (e.g. autobuild-2025-07-01-12-49).
          # Defaults to the rolling 'latest'.
          FFMPEG_TAG: ${{ vars.FFMPEG_TAG || 'latest' }}
          FFMPEG_ASSET: ffmpeg-master-latest-win64-gpl.zip
        run: |
          $rel = gh api "repos/BtbN/FFmpeg-Builds/releases/tags/$env:FFMPEG_TAG" | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -eq $env:FFMPEG_ASSET } | Select-Object -First 1
          if (-not $asset) { throw "ffmpeg asset '$env:FFMPEG_ASSET' not found in BtbN release '$env:FFMPEG_TAG'" }
          Write-Host "ffmpeg: $($asset.name) from tag $env:FFMPEG_TAG"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile ffmpeg.zip
          $sha = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash.ToLower()
          Write-Host "Downloaded SHA256: $sha"
          # Verify against GitHub's published asset digest.
          if ($asset.digest) {
            $expected = ($asset.digest -replace '^sha256:', '').ToLower()
            if ($sha -ne $expected) { throw "ffmpeg checksum mismatch: got $sha, expected $expected" }
            Write-Host "Checksum verified against GitHub-published digest."
          } else {
            Write-Host "::warning::No published digest for this asset; skipping verification."
          }
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ff = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ff) { throw "ffmpeg.exe not found in download" }
          Copy-Item $ff.FullName -Destination ffmpeg.exe -Force

      - name: Package release zip
        shell: pwsh
        run: |
          Copy-Item .env.example .env.example.txt -Force
          Compress-Archive -Path tablo4u-win-x64.exe, ffmpeg.exe, .env.example.txt -DestinationPath tablo4u-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tablo4u-win-x64
          path: tablo4u-win-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            tablo4u-win-x64.zip
            tablo4u-win-x64.exe
          generate_release_notes: true
