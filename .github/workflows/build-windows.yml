name: Build Windows exe

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Publish a release with this tag (e.g. v0.2.0). Leave empty to just build.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows executable
        run: npm run build:win

      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ff = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ff) { throw "ffmpeg.exe not found in download" }
          Copy-Item $ff.FullName -Destination ffmpeg.exe -Force

      - name: Package release zip
        shell: pwsh
        run: |
          Copy-Item .env.example .env.example.txt -Force
          Compress-Archive -Path tablo4u-win-x64.exe, ffmpeg.exe, .env.example.txt -DestinationPath tablo4u-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tablo4u-win-x64
          path: tablo4u-win-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            tablo4u-win-x64.zip
            tablo4u-win-x64.exe
          generate_release_notes: true
