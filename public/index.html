<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablo4U</title>
<style>
    /* dark = default */
    :root {
        --bg: #0f1216; --panel: #171b21; --panel2: #1e242c; --line: #2a323c;
        --text: #e7ecf2; --muted: #93a1b0; --accent: #4aa3ff; --accent2: #2b6fd4;
        --now: #ff5470; --live: #35c47b; --star: #ffce54;
    }
    :root[data-theme="light"] {
        --bg: #f4f6f9; --panel: #ffffff; --panel2: #eef2f6; --line: #d8e0e8;
        --text: #16202b; --muted: #5c6b7a; --accent: #1e6fe0; --accent2: #1656b0;
        --now: #e03357; --live: #1f9d5f; --star: #e0a000;
    }
    @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
            --bg: #f4f6f9; --panel: #ffffff; --panel2: #eef2f6; --line: #d8e0e8;
            --text: #16202b; --muted: #5c6b7a; --accent: #1e6fe0; --accent2: #1656b0;
            --now: #e03357; --live: #1f9d5f; --star: #e0a000;
        }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
        background: var(--bg); color: var(--text);
        font: 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex; flex-direction: column;
    }
    header {
        display: flex; align-items: center; gap: 10px; padding: 10px 16px; flex-wrap: wrap;
        background: var(--panel); border-bottom: 1px solid var(--line);
    }
    header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
    header h1 span { color: var(--accent); }
    .spacer { flex: 1; }
    header .status { color: var(--muted); font-size: 13px; }
    header input[type=date], header input[type=search] {
        background: var(--panel2); color: var(--text); border: 1px solid var(--line);
        border-radius: 8px; padding: 6px 10px; font: inherit;
    }
    header input[type=search] { min-width: 170px; }
    button {
        background: var(--accent2); color: #fff; border: 0; border-radius: 8px;
        padding: 7px 12px; font: inherit; cursor: pointer; white-space: nowrap;
    }
    button.ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--line); }
    button.on { background: var(--accent); color: #fff; }
    button:hover { filter: brightness(1.08); }

    #grid { flex: 1; overflow: auto; position: relative; }
    .timeaxis {
        position: sticky; top: 0; z-index: 3; display: flex;
        background: var(--panel); border-bottom: 1px solid var(--line);
        height: 32px; margin-left: var(--chan-w);
    }
    .tick { flex: 0 0 auto; border-left: 1px solid var(--line); color: var(--muted);
        font-size: 12px; padding: 8px 0 0 6px; }
    /* width:max-content makes the row span chan+track (chan 200px + full-day
       track ~4320px) so the sticky channel column stays pinned across the whole
       horizontal scroll instead of clamping to a viewport-width row box. */
    .row { display: flex; width: max-content; border-bottom: 1px solid var(--line); min-height: 64px; }
    .chan {
        position: sticky; left: 0; z-index: 2; flex: 0 0 var(--chan-w);
        width: var(--chan-w); background: var(--panel); border-right: 1px solid var(--line);
        display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 10px;
    }
    /* Tablo's logos are white-on-transparent (the "lightLarge" variant), so
       they'd vanish on a light background. Pin every logo to a fixed dark chip
       so it reads the same in both light and dark themes. */
    .chan .logo { width: 42px; height: 32px; object-fit: contain; border-radius: 5px; flex: 0 0 auto;
        background: #12161c; padding: 3px; }
    .chan .logo.nologo { display: flex; align-items: center; justify-content: center; padding: 2px;
        font-size: 10px; font-weight: 700; color: #cdd7e2; letter-spacing: .3px; text-align: center; overflow: hidden; }
    .chan .meta { flex: 1; min-width: 0; cursor: pointer; }
    .chan .meta:hover .name { color: var(--accent); }
    .chan .num { color: var(--accent); font-weight: 700; font-size: 12px; }
    .resbadge { display: inline-block; font-size: 9px; font-weight: 800; line-height: 1; padding: 2px 4px;
        border-radius: 3px; margin-left: 5px; vertical-align: middle; letter-spacing: .3px; }
    .resbadge.hd { background: var(--live); color: #04231a; }
    .resbadge.uhd { background: var(--accent); color: #fff; }
    .resbadge.sd { background: var(--panel2); color: var(--muted); border: 1px solid var(--line); }
    .chan .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chan .net { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .star { flex: 0 0 auto; cursor: pointer; font-size: 17px; color: var(--muted); background: none;
        border: 0; padding: 2px; line-height: 1; opacity: .55; }
    .star:hover { opacity: 1; }
    .star.fav { color: var(--star); opacity: 1; }
    .track { position: relative; flex: 1; }
    .prog {
        position: absolute; top: 6px; bottom: 6px; background: var(--panel2);
        border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
        overflow: hidden; cursor: pointer; transition: background .12s;
    }
    .prog:hover { background: var(--accent2); color: #fff; border-color: var(--accent); }
    .prog.live { border-left: 3px solid var(--live); }
    .prog .t { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prog .sub { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prog:hover .sub { color: #dbe7f7; }
    #pager { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 8px;
        background: var(--panel); border-top: 1px solid var(--line); color: var(--muted); font-size: 13px; }
    #pager button:disabled { opacity: .4; cursor: default; }
    #nowline { position: absolute; top: 32px; width: 2px; background: var(--now); z-index: 2; pointer-events: none; }
    #nowline::before { content: 'now'; position: absolute; top: -18px; left: -14px;
        background: var(--now); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 4px; }
    .empty { color: var(--muted); padding: 30px; text-align: center; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); display: none;
        align-items: center; justify-content: center; z-index: 10; padding: 12px; }
    .overlay.open { display: flex; }
    .pcard { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
        width: min(880px, 96vw); max-height: 92vh; overflow: auto; }
    .phead { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line);
        position: sticky; top: 0; background: var(--panel); }
    .phead .title { font-weight: 700; }
    .phead .spacer { flex: 1; }
    .pbody { padding: 16px; }
    .pbody video { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 16/9; }
    .note { color: var(--muted); font-size: 13px; margin-top: 10px; }
    #uTable td, #uTable th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
    #uTable .role { color: var(--muted); }
    .del { background: transparent; color: var(--now); border: 1px solid var(--line); }
    /* detail modal */
    .detail { display: flex; gap: 16px; flex-wrap: wrap; }
    .detail img { width: 260px; max-width: 100%; border-radius: 10px; background: var(--panel2); aspect-ratio: 16/9; object-fit: cover; }
    .detail .info { flex: 1; min-width: 220px; }
    .detail h2 { margin: 0 0 4px; font-size: 20px; }
    .detail .when { color: var(--accent); font-size: 13px; margin-bottom: 8px; }
    .detail .desc { color: var(--text); }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
    .chip { background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
        border-radius: 999px; padding: 2px 10px; font-size: 12px; }
    .recent-list { display: flex; flex-direction: column; gap: 6px; }
    .recent-item { display: flex; align-items: center; gap: 10px; padding: 8px; border: 1px solid var(--line);
        border-radius: 10px; cursor: pointer; }
    .recent-item:hover { background: var(--panel2); }
    .recent-item img { width: 44px; height: 32px; object-fit: contain; border-radius: 5px; background: #12161c; padding: 3px; }

    @media (max-width: 640px) {
        body { --chan-w: 132px !important; }
        header { gap: 8px; }
        header input[type=search] { min-width: 120px; flex: 1; }
        .chan .logo { width: 30px; height: 24px; }
        .detail img { width: 100%; }
    }
</style>
</head>
<body style="--chan-w:200px;">
    <header>
        <h1>Tablo<span>4U</span></h1>
        <input type="date" id="date">
        <button class="ghost" id="today">Today</button>
        <input type="search" id="search" name="guide-q" autocomplete="off" placeholder="Search guide…">
        <button class="ghost" id="favFilter" title="Show favorites only">★ Favorites</button>
        <button class="ghost" id="recentBtn">Recent</button>
        <div class="spacer"></div>
        <div class="status" id="status">Loading…</div>
        <button class="ghost" id="themeBtn" title="Theme">🌓 Auto</button>
        <button class="ghost" id="usersBtn" style="display:none">Users</button>
        <button class="ghost" id="logout" style="display:none">Log out</button>
    </header>
    <div id="fatal" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#b00020;color:#fff;padding:8px 12px;font:13px/1.4 system-ui;cursor:pointer;"></div>
    <div id="grid">
        <div class="timeaxis" id="timeaxis"></div>
        <div id="nowline" style="display:none"></div>
        <div id="rows"></div>
    </div>
    <div id="pager" style="display:none">
        <button class="ghost" id="prevPage" title="Show 2 hours earlier">‹ Earlier</button>
        <span id="pageInfo"></span>
        <button class="ghost" id="nextPage" title="Show 2 hours later">Later ›</button>
    </div>

    <!-- player -->
    <div id="player" class="overlay">
        <div class="pcard">
            <div class="phead">
                <div class="title" id="pTitle">—</div>
                <div class="spacer"></div>
                <button class="ghost" id="pipBtn" title="Picture-in-picture">⧉ PiP</button>
                <button class="ghost" id="pClose">Close</button>
            </div>
            <div class="pbody">
                <video id="video" controls autoplay playsinline></video>
                <div class="note" id="pNote"></div>
            </div>
        </div>
    </div>

    <!-- program detail -->
    <div id="detailModal" class="overlay">
        <div class="pcard">
            <div class="phead">
                <div class="title">Program</div>
                <div class="spacer"></div>
                <button id="dWatch">▶ Watch</button>
                <button class="ghost" id="dClose">Close</button>
            </div>
            <div class="pbody"><div class="detail" id="detailBody"></div></div>
        </div>
    </div>

    <!-- recently watched -->
    <div id="recentModal" class="overlay">
        <div class="pcard">
            <div class="phead">
                <div class="title">Recently watched</div>
                <div class="spacer"></div>
                <button class="ghost" id="rClose">Close</button>
            </div>
            <div class="pbody"><div class="recent-list" id="recentList"></div></div>
        </div>
    </div>

    <!-- users (admin) -->
    <div id="usersModal" class="overlay">
        <div class="pcard">
            <div class="phead">
                <div class="title">Users</div>
                <div class="spacer"></div>
                <button class="ghost" id="uClose">Close</button>
            </div>
            <div class="pbody">
                <table id="uTable" style="width:100%;border-collapse:collapse;font-size:14px"></table>
                <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:flex-end">
                    <div><label style="display:block;color:var(--muted);font-size:12px">Username</label>
                        <input id="uName" style="padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text)"></div>
                    <div><label style="display:block;color:var(--muted);font-size:12px">Password</label>
                        <input id="uPass" type="password" style="padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text)"></div>
                    <label style="color:var(--muted);font-size:13px"><input type="checkbox" id="uAdmin"> admin</label>
                    <button id="uAdd">Add user</button>
                </div>
                <div class="note" id="uMsg"></div>
            </div>
        </div>
    </div>

<script src="/vendor/mpegts.js"></script>
<script>
const WINDOW_MIN = 240, PX_PER_MIN = 5;  // rolling window: ~1h before, ~3h after now
const SHIFT_MIN = 120;                   // Earlier/Later navigation step
const CHUNK = 50;                        // channels rendered per lazy-load batch
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Surface any uncaught error/rejection on-screen instead of a mystery blank.
function showFatal(msg) {
    const el = $('#fatal'); if (!el) return;
    el.textContent = '⚠ ' + msg + '   (click to dismiss)';
    el.style.display = 'block';
    el.onclick = () => { el.style.display = 'none'; };
}
// Benign player/MSE noise (mpegts.js teardown races, SourceBuffer detach) —
// these fire when a stream ends or a channel is switched and are harmless, so
// don't alarm the user with the red banner; just log them.
const BENIGN_ERR = /SourceBuffer|buffered|MediaSource|media source|mpegts|removed from the parent|append|MSE/i;
window.addEventListener('error', (e) => {
    const m = e.message || 'error';
    if (BENIGN_ERR.test(m)) { console.warn('[player]', m); return; }
    showFatal(m + (e.filename ? ` @ ${(e.filename + '').split('/').pop()}:${e.lineno}` : ''));
});
window.addEventListener('unhandledrejection', (e) => {
    const m = String((e.reason && (e.reason.message || e.reason)) || 'rejection');
    if (BENIGN_ERR.test(m)) { console.warn('[player]', m); return; }
    showFatal('promise: ' + m);
});

let channels = [], guide = {}, windowStart;
let favorites = new Set(), recent = [];
let favOnly = false, query = '';
const chById = {};

function selectedDateStr() { return $('#date').value; }
function isToday() { return selectedDateStr() === new Date().toISOString().slice(0, 10); }
function filteredChannels() { return channels.filter(channelMatches); }

function fmtTime(d) { return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function chanNum(ch) { const k = ch.ota || ch.ott || {}; return (k.major != null) ? `${k.major}.${k.minor}` : ''; }
function chanNet(ch) { const k = ch.ota || ch.ott || {}; return k.network || ch.name || ''; }
function chanLogo(ch) { const l = (ch.logos || []).find(x => x.kind === 'lightLarge') || (ch.logos || [])[0]; return l && l.url; }
function chanCall(ch) { const k = ch.ota || ch.ott || {}; return (k.callSign || ch.name || chanNum(ch) || '?').toString(); }
function resBadge(ch) {
    const r = (ch.resolution || '').toLowerCase();
    if (!r) return '';
    if (r.startsWith('uhd') || r.includes('2160') || r.includes('4k')) return '<span class="resbadge uhd">4K</span>';
    if (r.startsWith('hd') || r.includes('1080') || r.includes('720')) return '<span class="resbadge hd">HD</span>';
    if (r.startsWith('sd') || r.includes('480')) return '<span class="resbadge sd">SD</span>';
    return '';
}

async function api(path, opts) {
    const r = await fetch(path, opts);
    if (r.status === 401) { location.href = '/login'; return null; }
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.status);
    return r.json();
}

function buildAxis() {
    const axis = $('#timeaxis'); axis.innerHTML = '';
    for (let m = 0; m <= WINDOW_MIN; m += 30) {
        const t = new Date(windowStart.getTime() + m * 60000);
        const tick = document.createElement('div');
        tick.className = 'tick'; tick.style.width = (30 * PX_PER_MIN) + 'px'; tick.textContent = fmtTime(t);
        axis.appendChild(tick);
    }
}

function channelMatches(ch) {
    if (favOnly && !favorites.has(ch.identifier)) return false;
    if (!query) return true;
    const q = query.toLowerCase();
    if ((ch.name || '').toLowerCase().includes(q) || chanNet(ch).toLowerCase().includes(q) || chanNum(ch).includes(q)) return true;
    return (guide[ch.identifier] || []).some(a =>
        (a.title || '').toLowerCase().includes(q) || (a.description || '').toLowerCase().includes(q));
}

function updateNowline() {
    const nl = $('#nowline');
    const now = Date.now();
    const winEnd = windowStart.getTime() + WINDOW_MIN * 60000;
    if (now >= windowStart.getTime() && now <= winEnd) {
        nl.style.left = `calc(var(--chan-w) + ${(now - windowStart.getTime()) / 60000 * PX_PER_MIN}px)`;
        nl.style.height = ($('#rows').offsetHeight || 0) + 'px';   // span all rendered rows
        nl.style.display = 'block';
    } else nl.style.display = 'none';
}

function updateWindowLabel() {
    const end = new Date(windowStart.getTime() + WINDOW_MIN * 60000);
    $('#pageInfo').textContent = `${fmtTime(windowStart)} – ${fmtTime(end)} · ${currentList.length} ch`;
    $('#pager').style.display = 'flex';
}

// Build one channel row (pinned channel column + program track for the window).
function buildRow(ch) {
    const row = document.createElement('div'); row.className = 'row';
    const c = document.createElement('div'); c.className = 'chan';
    const logoUrl = chanLogo(ch);
    const isFav = favorites.has(ch.identifier);
    c.innerHTML =
        (logoUrl ? `<img class="logo" src="${esc(logoUrl)}" alt="" onerror="this.parentNode.replaceChild(Object.assign(document.createElement('div'),{className:'logo nologo',textContent:this.dataset.call}),this)" data-call="${esc(chanCall(ch))}">` : `<div class="logo nologo">${esc(chanCall(ch))}</div>`)
        + `<div class="meta"><div class="num">${esc(chanNum(ch))}${resBadge(ch)}</div><div class="name">${esc(ch.name || '')}</div><div class="net">${esc(chanNet(ch))}</div></div>`
        + `<button class="star ${isFav ? 'fav' : ''}" title="Favorite">${isFav ? '★' : '☆'}</button>`;
    c.querySelector('.meta').onclick = () => watchChannel(ch);
    c.querySelector('.star').onclick = (e) => { e.stopPropagation(); toggleFav(ch); };
    row.appendChild(c);

    const winStartMs = windowStart.getTime();
    const winEndMs = winStartMs + WINDOW_MIN * 60000;
    const now = Date.now();
    const track = document.createElement('div'); track.className = 'track'; track.style.width = (WINDOW_MIN * PX_PER_MIN) + 'px';
    for (const a of (guide[ch.identifier] || [])) {
        const start = new Date(a.datetime);
        const end = new Date(start.getTime() + (a.duration || 1800) * 1000);
        if (end.getTime() <= winStartMs || start.getTime() >= winEndMs) continue;
        const left = Math.max(0, (start.getTime() - winStartMs) / 60000) * PX_PER_MIN;
        const right = Math.min(WINDOW_MIN, (end.getTime() - winStartMs) / 60000) * PX_PER_MIN;
        const el = document.createElement('div');
        el.className = 'prog' + (start.getTime() <= now && now < end.getTime() ? ' live' : '');
        el.style.left = left + 'px'; el.style.width = Math.max(24, right - left - 4) + 'px';
        el.innerHTML = `<div class="t">${esc(a.title || (a.show && a.show.title) || 'Program')}</div>`
            + `<div class="sub">${fmtTime(start)}${a.description ? ' · ' + esc(a.description) : ''}</div>`;
        el.onclick = () => showDetail(ch, a);
        track.appendChild(el);
    }
    row.appendChild(track);
    return row;
}

let currentList = [];
let renderedCount = 0;

// Append the next batch of channel rows (lazy load on vertical scroll).
function appendRows(n) {
    const rows = $('#rows');
    const end = Math.min(currentList.length, renderedCount + n);
    for (let i = renderedCount; i < end; i++) rows.appendChild(buildRow(currentList[i]));
    renderedCount = end;
    updateNowline();
}

function render() {
    buildAxis();
    const rows = $('#rows'); rows.innerHTML = '';
    currentList = filteredChannels();
    renderedCount = 0;
    updateWindowLabel();
    if (!currentList.length) { rows.innerHTML = '<div class="empty">No channels match.</div>'; $('#nowline').style.display = 'none'; return; }
    appendRows(CHUNK);
}

// Lazy-load more channels as the grid nears the bottom.
$('#grid').addEventListener('scroll', () => {
    const g = $('#grid');
    if (renderedCount < currentList.length && g.scrollTop + g.clientHeight >= g.scrollHeight - 300) appendRows(CHUNK);
});

function computeWindow() {
    // Anchor ~1h before the current clock time on the selected day: ~1h of
    // context behind, ~3h ahead — no more scrolling past hours of dead
    // early-morning programming late in the day.
    const now = new Date();
    const d = new Date(selectedDateStr() + 'T00:00:00');
    d.setHours(now.getHours(), 0, 0, 0);
    windowStart = new Date(d.getTime() - 60 * 60000);
}

// ---- guide data (cached per calendar day; a window can span two days) ----
let guideByDate = {};

function dstr(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function datesForWindow() {
    const end = new Date(windowStart.getTime() + WINDOW_MIN * 60000);
    return [...new Set([dstr(windowStart), dstr(end)])];
}
async function ensureGuide(dates) {
    await Promise.all(dates.map(async (d) => {
        if (guideByDate[d]) return;
        try { const g = await api('/api/guide?date=' + d); guideByDate[d] = (g && g.guide) || {}; }
        catch { guideByDate[d] = {}; }
    }));
}
function rebuildGuide() {
    guide = {};
    for (const d of datesForWindow()) {
        const gd = guideByDate[d]; if (!gd) continue;
        for (const id in gd) (guide[id] = guide[id] || []).push(...gd[id]);
    }
}
async function setWindow(newStart) {
    windowStart = newStart;
    $('#status').textContent = 'Loading…';
    await ensureGuide(datesForWindow());
    rebuildGuide();
    render();
    $('#grid').scrollTop = 0;
    $('#status').textContent = `${channels.length} channels`;
}
function shiftWindow(mins) { return setWindow(new Date(windowStart.getTime() + mins * 60000)); }

async function load() {
    try {
        computeWindow();
        $('#status').textContent = 'Loading guide…';
        const [chs, prof] = await Promise.all([
            api('/api/channels'), api('/api/profile').catch(() => ({ favorites: [], recent: [] }))
        ]);
        if (!chs) return;
        channels = chs;
        for (const ch of channels) chById[ch.identifier] = ch;
        favorites = new Set((prof && prof.favorites) || []);
        recent = (prof && prof.recent) || [];
        guideByDate = {};
        await ensureGuide(datesForWindow());
        rebuildGuide();
        render();
        $('#status').textContent = `${channels.length} channels`;
    } catch (e) {
        $('#status').textContent = 'Error';
        alert('Could not load from Tablo: ' + e.message);
    }
}

// ---- favorites ----
async function toggleFav(ch) {
    const on = !favorites.has(ch.identifier);
    if (on) favorites.add(ch.identifier); else favorites.delete(ch.identifier);
    render();
    try { await fetch('/api/favorites/' + encodeURIComponent(ch.identifier), { method: on ? 'PUT' : 'DELETE' }); } catch {}
}

// ---- program detail ----
function showDetail(ch, a) {
    const start = new Date(a.datetime);
    const end = new Date(start.getTime() + (a.duration || 1800) * 1000);
    const img = (a.images && a.images[0] && a.images[0].url) || '';
    const ep = a.episode && a.episode.episodeNumber != null
        ? `S${(a.episode.season && a.episode.season.number) || '?'} · E${a.episode.episodeNumber}` : '';
    $('#detailBody').innerHTML =
        (img ? `<img src="${esc(img)}" alt="">` : '')
        + `<div class="info"><h2>${esc(a.title || 'Program')}</h2>`
        + `<div class="when">${esc(ch.name)} ${esc(chanNum(ch))} · ${fmtTime(start)}–${fmtTime(end)}${ep ? ' · ' + esc(ep) : ''}</div>`
        + (a.genres && a.genres.length ? `<div class="chips">${a.genres.map(g => `<span class="chip">${esc(g)}</span>`).join('')}</div>` : '')
        + `<div class="desc">${esc(a.description || 'No description available.')}</div></div>`;
    $('#dWatch').onclick = () => { $('#detailModal').classList.remove('open'); watchChannel(ch, a); };
    $('#detailModal').classList.add('open');
}

// ---- player ----
let player = null;
let closingPlayer = false;   // true while we intentionally tear the stream down
function destroyPlayer() {
    if (player) {
        // Tear down in order (pause → unload → detach → destroy) to avoid the
        // mpegts.js "SourceBuffer removed from parent media source" race.
        try { player.pause(); } catch {}
        try { player.unload(); } catch {}
        try { player.detachMediaElement(); } catch {}
        try { player.destroy(); } catch {}
        player = null;
    }
    const v = $('#video'); try { v.pause(); v.removeAttribute('src'); v.load(); } catch {}
}
function inPiP() { return document.pictureInPictureElement === $('#video'); }
// Close the player UI. While the video is popped out to picture-in-picture we
// keep the stream running (just hide the modal) so PiP doesn't freeze; a real
// close exits PiP and tears the stream down (freeing the tuner).
async function closePlayer() {
    if (inPiP() && !closingPlayer) { $('#player').classList.remove('open'); return; }
    closingPlayer = true;
    try {
        if (document.pictureInPictureElement) { try { await document.exitPictureInPicture(); } catch {} }
        $('#player').classList.remove('open');
        destroyPlayer();
    } finally { closingPlayer = false; }
}
// Returning from PiP (back-to-tab or closing the float): show the modal again
// so the live stream stays visible in-page instead of vanishing. Only an
// explicit Close (closingPlayer) stops the stream.
$('#video').addEventListener('leavepictureinpicture', () => {
    if (!closingPlayer && player) $('#player').classList.add('open');
});
function watchChannel(ch, airing) {
  try {
    $('#pTitle').textContent = (airing && airing.title) ? `${ch.name} — ${airing.title}` : (ch.name || 'Live');
    $('#player').classList.add('open');
    destroyPlayer();
    // bump recent locally + let the server record it (stream endpoint does too)
    recent = [{ id: ch.identifier, at: Date.now() }, ...recent.filter(r => r.id !== ch.identifier)].slice(0, 20);
    const video = $('#video');
    if (!window.mpegts || !mpegts.isSupported()) {
        $('#pNote').textContent = "This browser can't play live streams (Media Source Extensions unavailable).";
        return;
    }
    $('#pNote').textContent = ch.kind === 'ota'
        ? 'OTA channel — transcoding to H.264 on the server (takes a moment to start)…' : 'Starting stream…';
    player = mpegts.createPlayer(
        { type: 'mpegts', isLive: true, url: '/api/stream/' + encodeURIComponent(ch.identifier) },
        // Gentle latency chasing — aggressive chasing made OTT feeds skip/break up.
        { lazyLoad: false, liveBufferLatencyChasing: true, liveBufferLatencyMaxLatency: 6.0, liveBufferLatencyMinRemain: 1.0, autoCleanupSourceBuffer: true }
    );
    player.attachMediaElement(video);
    player.on(mpegts.Events.ERROR, (t, d) => { $('#pNote').textContent = 'Stream error: ' + t + (d ? ' (' + d + ')' : ''); });
    player.on(mpegts.Events.MEDIA_INFO, () => { $('#pNote').textContent = ch.name + ' — live'; });
    player.load(); video.play().catch(() => {});
  } catch (e) {
    $('#pNote').textContent = 'Could not start player: ' + (e && e.message || e);
  }
}
$('#pClose').onclick = () => closePlayer();
$('#pipBtn').onclick = async () => {
    const v = $('#video');
    try {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();   // re-shows the modal via the leave handler
        } else if (v.requestPictureInPicture) {
            await v.requestPictureInPicture();
            $('#player').classList.remove('open');   // hand off: pop out and return to the guide
        } else {
            $('#pNote').textContent = 'Picture-in-picture is not supported in this browser.';
        }
    } catch (e) { $('#pNote').textContent = 'PiP error: ' + e.message; }
};

// ---- recently watched ----
$('#recentBtn').onclick = () => {
    const list = $('#recentList'); list.innerHTML = '';
    if (!recent.length) { list.innerHTML = '<div class="empty">Nothing watched yet.</div>'; }
    for (const r of recent) {
        const ch = chById[r.id]; if (!ch) continue;
        const item = document.createElement('div'); item.className = 'recent-item';
        const logoUrl = chanLogo(ch);
        item.innerHTML = (logoUrl ? `<img src="${esc(logoUrl)}" alt="">` : `<div class="logo nologo">${esc(chanCall(ch))}</div>`)
            + `<div><div class="name">${esc(ch.name)}</div><div class="net">${esc(chanNum(ch))} · ${esc(chanNet(ch))}</div></div>`;
        item.onclick = () => { $('#recentModal').classList.remove('open'); watchChannel(ch); };
        list.appendChild(item);
    }
    $('#recentModal').classList.add('open');
};
$('#rClose').onclick = () => $('#recentModal').classList.remove('open');
$('#dClose').onclick = () => $('#detailModal').classList.remove('open');

// ---- search / filters ----
let searchTimer;
$('#search').oninput = (e) => { clearTimeout(searchTimer); searchTimer = setTimeout(() => { query = e.target.value.trim(); $('#grid').scrollTop = 0; render(); }, 180); };
$('#favFilter').onclick = () => { favOnly = !favOnly; $('#favFilter').classList.toggle('on', favOnly); $('#grid').scrollTop = 0; render(); };

// close overlays on backdrop click / Escape (the player routes through
// closePlayer so a picture-in-picture stream keeps playing instead of freezing)
document.querySelectorAll('.overlay').forEach(o => o.onclick = (e) => { if (e.target === o) { if (o.id === 'player') closePlayer(); else o.classList.remove('open'); } });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.querySelectorAll('.overlay.open').forEach(o => { if (o.id === 'player') closePlayer(); else o.classList.remove('open'); }); });

$('#date').onchange = () => load();
$('#today').onclick = () => { setToday(); load(); };
$('#logout').onclick = async () => { await fetch('/api/logout', { method: 'POST' }); location.href = '/login'; };
$('#prevPage').onclick = () => shiftWindow(-SHIFT_MIN);
$('#nextPage').onclick = () => shiftWindow(SHIFT_MIN);
function setToday() { $('#date').value = new Date().toISOString().slice(0, 10); }
// keep the now-line moving as time passes
setInterval(() => { if (windowStart) updateNowline(); }, 30000);

// ---- theme ----
const THEME_KEY = 'tablo4u-theme';
function applyTheme(t) {
    const root = document.documentElement;
    if (t === 'light' || t === 'dark') root.setAttribute('data-theme', t); else root.removeAttribute('data-theme');
    const btn = $('#themeBtn');
    if (btn) btn.textContent = t === 'light' ? '☀️ Light' : t === 'dark' ? '🌙 Dark' : '🌓 Auto';
}
$('#themeBtn').onclick = () => {
    const cur = localStorage.getItem(THEME_KEY) || 'auto';
    const next = cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto';
    localStorage.setItem(THEME_KEY, next); applyTheme(next);
};
applyTheme(localStorage.getItem(THEME_KEY) || 'auto');

// ---- admin: user management ----
async function loadUsers() {
    const t = $('#uTable'); t.innerHTML = '<tr><th>User</th><th>Role</th><th></th></tr>';
    try {
        for (const u of await api('/api/users')) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${esc(u.username)}</td><td class="role">${esc(u.role)}</td>`
                + `<td style="text-align:right"><button class="del" data-u="${esc(u.username)}">Remove</button></td>`;
            t.appendChild(tr);
        }
        t.querySelectorAll('.del').forEach(b => b.onclick = async () => {
            if (!confirm('Remove user ' + b.dataset.u + '?')) return;
            const r = await fetch('/api/users/' + encodeURIComponent(b.dataset.u), { method: 'DELETE' });
            const j = await r.json(); if (!r.ok) $('#uMsg').textContent = j.error || 'Error'; else loadUsers();
        });
    } catch (e) { $('#uMsg').textContent = e.message; }
}
$('#usersBtn').onclick = () => { $('#uMsg').textContent = ''; $('#usersModal').classList.add('open'); loadUsers(); };
$('#uClose').onclick = () => $('#usersModal').classList.remove('open');
$('#uAdd').onclick = async () => {
    $('#uMsg').textContent = '';
    const r = await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: $('#uName').value, password: $('#uPass').value, role: $('#uAdmin').checked ? 'admin' : 'user' }) });
    const j = await r.json(); if (!r.ok) { $('#uMsg').textContent = j.error || 'Error'; return; }
    $('#uName').value = ''; $('#uPass').value = ''; $('#uAdmin').checked = false; loadUsers();
};

(async function () {
    const me = await fetch('/api/me').then(r => r.json()).catch(() => ({}));
    if (!me.open) $('#logout').style.display = '';
    if (me.user && me.user.role === 'admin') $('#usersBtn').style.display = '';
    setToday(); await load();
})();
</script>
