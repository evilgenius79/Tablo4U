<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablo4U — Sign in</title>
<style>
    :root { --bg:#0f1216; --panel:#171b21; --panel2:#1e242c; --line:#2a323c; --text:#e7ecf2; --muted:#93a1b0; --accent:#4aa3ff; --accent2:#2b6fd4; }
    @media (prefers-color-scheme: light) { :root { --bg:#f4f6f9; --panel:#fff; --panel2:#eef2f6; --line:#d8e0e8; --text:#16202b; --muted:#5c6b7a; --accent:#1e6fe0; --accent2:#1656b0; } }
    * { box-sizing:border-box; }
    body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--text); font:15px system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:28px; width:min(360px,92vw); }
    h1 { margin:0 0 4px; font-size:22px; } h1 span { color:var(--accent); }
    p { color:var(--muted); margin:0 0 20px; font-size:13px; }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 5px; }
    input { width:100%; padding:10px 12px; background:var(--panel2); border:1px solid var(--line); border-radius:9px; color:var(--text); font:inherit; }
    button { width:100%; margin-top:18px; padding:11px; background:var(--accent2); color:#fff; border:0; border-radius:9px; font:inherit; font-weight:600; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    .err { color:#ff6b81; font-size:13px; margin-top:12px; min-height:16px; }
</style>
</head>
<body>
    <form class="card" id="f">
        <h1>Tablo<span>4U</span></h1>
        <p>Sign in to watch your Tablo.</p>
        <label>Username</label>
        <input id="u" autocomplete="username" value="admin">
        <label>Password</label>
        <input id="p" type="password" autocomplete="current-password">
        <button type="submit">Sign in</button>
        <div class="err" id="err"></div>
    </form>
<script>
document.getElementById('f').onsubmit = async (e) => {
    e.preventDefault();
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
    if (r.ok) location.href = '/';
    else document.getElementById('err').textContent = 'Invalid credentials';
};
</script>
</body>
</html>
